name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Type check with mypy
        run: mypy src/llm_kernel_lab/ --ignore-missing-imports

      - name: Run unit tests
        run: pytest tests/ -v --tb=short -x

  cuda-tests:
    runs-on: [self-hosted, gpu]
    if: github.event_name == 'push'
    needs: lint-and-unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Run GPU tests
        run: pytest tests/ -v --tb=short -k "gpu or cuda"

      - name: Run basic benchmark
        run: |
          llm-kernel-lab record-hw --output ./results/hw.json

  deploy-website:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint-and-unit-tests

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.124.1"
          extended: true

      - name: Build website
        run: hugo --minify -s website

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
